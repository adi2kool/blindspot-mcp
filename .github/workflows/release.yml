name: Release

# On a version tag (vX.Y.Z): re-run the gates, publish the package to PyPI via Trusted
# Publishing (OIDC, no stored token), push the container image to GHCR with the built-in
# GITHUB_TOKEN, and cut a GitHub Release. One-time setup: add this repo as a Trusted
# Publisher on the PyPI project 'airlock-mcp' (Publishing -> Add a pending publisher).

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  pypi:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - name: Gate (tests / red-team / benchmark)
        run: |
          uv sync --frozen --python 3.12
          uv run pytest -q
          uv run airlock redteam
          uv run python benchmark/run.py
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  image:
    name: build + push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [pypi, image]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "See CHANGELOG.md for ${{ github.ref_name }}."
